name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to upload releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Hive Adapters
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Tests
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            Automatic release generated by GitHub Actions.
            
            ### Artifacts
            - **[Download APK (app-release.apk)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/app-release.apk)**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
